# تعريف إصدار الإعدادات
schemaVersion: v1

# إعدادات التشغيل والبناء
runConfig:
  # الأمر الذي يحول الـ 50 صفحة إلى ملفات جاهزة (Vite Build)
  build: "npm run build"
  
  # المجلد الذي سيخرج فيه النظام النهائي (مهم جداً لـ Vite)
  outputDirectory: "dist"

# إعدادات البيئة (اختياري: إذا أردت وضع مفتاح Gemini هنا)
env:
  - variable: GOOGLE_API_KEY
    value: "ضغ_مفتاحك_هنا_أو_اتركه_في_لوحة_تحكم_فايربيس"
